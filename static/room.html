<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CONCLAVE // TERMINAL</title>
    <style>
        :root {
            --cobalt: #38bdf8; --carbon: #0f172a; --steel: #1e293b; --border: #334155; --text: #f8fafc; --danger: #ef4444;
        }
        body { 
            font-family: 'JetBrains Mono', monospace; background: var(--carbon); color: var(--text); 
            margin: 0; height: 100vh; display: flex; flex-direction: column;
        }
        header {
            background: var(--steel); border-bottom: 2px solid var(--border);
            padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85em; text-transform: uppercase;
        }
        #log { flex-grow: 1; padding: 24px; overflow-y: auto; background: rgba(0,0,0,0.2); }
        .entry { margin-bottom: 6px; padding: 4px 10px; border-left: 2px solid transparent; }
        .entry.self { border-left-color: var(--cobalt); background: rgba(56, 189, 248, 0.03); }
        .entry.sys { color: #64748b; font-size: 0.8em; }
        .uid { color: var(--cobalt); font-weight: bold; margin-right: 12px; }
        .input-area {
            background: var(--steel); border-top: 2px solid var(--border);
            padding: 15px 20px; display: flex; gap: 10px;
        }
        input { flex-grow: 1; background: var(--carbon); border: 1px solid var(--border); color: #fff; padding: 12px; outline: none; }
        button { background: var(--cobalt); color: #000; border: none; padding: 0 25px; font-weight: 900; cursor: pointer; }
        .btn-leave { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 5px 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <header>
        <div>SEGMENT: <span id="room-id" style="color:var(--cobalt)">0x00</span></div>
        <div>OPERATOR: <span id="user-id" style="color:var(--cobalt)">0000</span></div>
        <button class="btn-leave" onclick="leaveRoom()">TERMINATE_LINK</button>
    </header>
    <div id="log"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="READY FOR INPUT..." autofocus autocomplete="off">
        <button onclick="send()">TRANSMIT</button>
    </div>

<script>
    const API_BASE = window.location.origin;
    const token = sessionStorage.getItem('conclave_token');
    const roomId = parseInt(window.location.pathname.split('=')[1]);
    const log = document.getElementById('log');
    let aesKey = null;

    const CryptoEngine = {
        async deriveKey(password, roomInt) {
            const encoder = new TextEncoder();
            const salt = encoder.encode(`conclave_salt_${roomInt}`);
            const baseKey = await crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        },
        async encrypt(text, key) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(text));
            const combined = new Uint8Array(iv.length + ciphertext.byteLength);
            combined.set(iv); combined.set(new Uint8Array(ciphertext), iv.length);
            return combined;
        },
        async decrypt(data, key) {
            try {
                const iv = data.slice(0, 12);
                const ciphertext = data.slice(12);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
                return new TextDecoder().decode(decrypted);
            } catch (e) { return "[DECRYPTION_FAILED: INVALID_KEY]"; }
        }
    };

    function getUID() {
        const binaryData = atob(token);
        return ((binaryData.charCodeAt(0) << 24) | (binaryData.charCodeAt(1) << 16) |
                (binaryData.charCodeAt(2) << 8)  | binaryData.charCodeAt(3)) >>> 0;
    }
    const myUID = getUID();

    document.getElementById('room-id').innerText = `0x${roomId.toString(16).toUpperCase()}`;
    document.getElementById('user-id').innerText = myUID;

    const socket = new WebSocket(`ws://${window.location.hostname}:8080`);
    socket.binaryType = 'arraybuffer';

    socket.onopen = async () => {
        // AUTOMATIC KEY DERIVATION (No prompt)
        const cachedPw = sessionStorage.getItem('last_segment_pw') || "public";
        aesKey = await CryptoEngine.deriveKey(cachedPw, roomId);
        
        const rawToken = Uint8Array.from(atob(token), c => c.charCodeAt(0));
        const packet = new Uint8Array(4 + rawToken.length);
        new DataView(packet.buffer).setUint32(0, rawToken.length, false); 
        packet.set(rawToken, 4);
        socket.send(packet);
        addEntry("LINK ESTABLISHED // E2EE ACTIVE", 0);
    };

    socket.onmessage = async (event) => {
        const view = new DataView(event.data);
        const senderUid = view.getUint32(4, false); 
        const body = new Uint8Array(event.data.slice(8));
        const text = (senderUid === 0) ? new TextDecoder().decode(body) : await CryptoEngine.decrypt(body, aesKey);
        addEntry(text, senderUid);
    };

    async function send() {
        const input = document.getElementById('msg');
        if (!input.value || !aesKey) return;
        const encrypted = await CryptoEngine.encrypt(input.value, aesKey);
        const packet = new Uint8Array(13 + encrypted.length);
        const view = new DataView(packet.buffer);
        view.setUint32(0, 9 + encrypted.length, false); 
        packet[4] = 0x00; 
        view.setUint32(5, roomId, false); 
        view.setUint32(9, myUID, false); // Public UID header
        packet.set(encrypted, 13);
        socket.send(packet);
        addEntry(input.value, myUID);
        input.value = '';
    }

    async function leaveRoom() {
        await fetch(`${API_BASE}/leave?roomId=${roomId}&user_id=${myUID}`, { method: 'PUT' });
        window.location.href = "/";
    }

    function addEntry(text, sender) {
        const div = document.createElement('div');
        const isSelf = sender === myUID;
        const isSys = sender === 0;
        div.className = `entry ${isSelf ? 'self' : ''} ${isSys ? 'sys' : ''}`;
        div.innerHTML = `<span class="uid">[${sender || 'SYS'}]</span><span class="txt">${text}</span>`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    document.getElementById('msg').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
