<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conclave | Active Segment</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #00ff41; padding: 20px; overflow: hidden; }
        .terminal { border: 1px solid #00ff41; height: 70vh; padding: 20px; overflow-y: auto; background: rgba(0,20,0,0.2); }
        .input-line { display: flex; margin-top: 20px; border: 1px solid #00ff41; }
        input { background: transparent; border: none; color: #00ff41; flex-grow: 1; padding: 15px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2 id="header">ACCESSING_SEGMENT...</h2>
    <div class="terminal" id="log"></div>
    <div class="input-line">
        <input type="text" id="msg" placeholder="Command..." autofocus>
        <button onclick="send()">SEND</button>
    </div>

<script>
    const API_BASE = window.location.origin;
    const token = sessionStorage.getItem('conclave_token');
    const roomId = parseInt(window.location.pathname.split('=')[1]);
    const log = document.getElementById('log');

    document.getElementById('header').innerText = `SEGMENT_ID: 0x${roomId.toString(16)}`;

    // FIX: Use hostname, not origin
    const socket = new WebSocket(`ws://${window.location.hostname}:8080`);
    socket.binaryType = 'arraybuffer';

    socket.onopen = () => {
        printLog("[SYSTEM] Connected to Proxy. Sending HMAC Token...");
        
        // FIX: Variable name 'token'
        const rawToken = Uint8Array.from(atob(token), c => c.charCodeAt(0));
        const packet = new Uint8Array(4 + rawToken.length);
        new DataView(packet.buffer).setUint32(0, rawToken.length, false); 
        packet.set(rawToken, 4);
        
        socket.send(packet);
    };

    socket.onmessage = (event) => {
        // Decoding: Skip the 4B Length + 1B Type
        const decoded = new TextDecoder().decode(event.data.slice(5)); 
        printLog(`> ${decoded}`);
    };

socket.onerror = (err) => printLog("[ERROR] Connection failed. Check Websockify.");

    function send() {
        const text = document.getElementById('msg').value;
        if (!text) return;

        // Binary MSG format: [Length(4B)][Type(1B:0x00)][RoomID(4B)][Payload]
        const encoder = new TextEncoder();
        const payload = encoder.encode(text);
        const packet = new Uint8Array(4 + 1 + 4 + payload.length);
        const view = new DataView(packet.buffer);
        
        view.setUint32(0, 1 + 4 + payload.length, false); // Total Body Length
        packet[4] = 0x00; // MessageType::MSG
        view.setUint32(5, roomId, false); // Destination Room
        packet.set(payload, 9);

        socket.send(packet);
        document.getElementById('msg').value = '';
    }

    function printLog(txt) {
        log.innerHTML += `<div>${txt}</div>`;
        log.scrollTop = log.scrollHeight;
    }
</script>
</body>
</html>
