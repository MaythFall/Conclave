<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CONCLAVE // TERMINAL</title>
    <style>
        :root {
            --cobalt: #38bdf8;
            --carbon: #0f172a;
            --steel: #1e293b;
            --border: #334155;
            --text: #f8fafc;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; 
            background: var(--carbon); color: var(--text); 
            margin: 0; height: 100vh; display: flex; flex-direction: column;
        }

        header {
            background: var(--steel); border-bottom: 2px solid var(--border);
            padding: 12px 24px; display: flex; justify-content: space-between;
            font-size: 0.85em; text-transform: uppercase;
        }

        #log { flex-grow: 1; padding: 24px; overflow-y: auto; background: rgba(0,0,0,0.2); }

        /* Industrial Entry Styles */
        .entry { margin-bottom: 6px; padding: 4px 10px; border-left: 2px solid transparent; }
        .entry.self { border-left-color: var(--cobalt); background: rgba(56, 189, 248, 0.03); }
        .entry.sys { color: #64748b; font-size: 0.8em; }

        .uid { color: var(--cobalt); font-weight: bold; margin-right: 12px; }
        .self .uid { color: #fff; }

        .input-area {
            background: var(--steel); border-top: 2px solid var(--border);
            padding: 15px 20px; display: flex; gap: 10px;
        }

        input {
            flex-grow: 1; background: var(--carbon); border: 1px solid var(--border);
            color: #fff; padding: 12px; font-family: inherit; outline: none;
        }

        button {
            background: var(--cobalt); color: #000; border: none;
            padding: 0 25px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div>SEGMENT: <span id="room-id" style="color:var(--cobalt)">0x00</span></div>
        <div>OPERATOR: <span id="user-id" style="color:var(--cobalt)">0000</span></div>
        <div id="status">STATUS: LINK_ESTABLISHED</div>
    </header>

    <div id="log"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="READY FOR INPUT..." autofocus autocomplete="off">
        <button onclick="send()">TRANSMIT</button>
    </div>

<script>
    const token = sessionStorage.getItem('conclave_token');
    const roomId = parseInt(window.location.pathname.split('=')[1]);
    const log = document.getElementById('log');

    function getUID() {
        const binaryData = atob(token);
        return ((binaryData.charCodeAt(0) << 24) | (binaryData.charCodeAt(1) << 16) |
                (binaryData.charCodeAt(2) << 8)  | binaryData.charCodeAt(3)) >>> 0;
    }
    const myUID = getUID();

    document.getElementById('room-id').innerText = `0x${roomId.toString(16).toUpperCase()}`;
    document.getElementById('user-id').innerText = myUID;

    const socket = new WebSocket(`ws://${window.location.hostname}:8080`);
    socket.binaryType = 'arraybuffer';

    socket.onopen = () => {
        const rawToken = Uint8Array.from(atob(token), c => c.charCodeAt(0));
        const packet = new Uint8Array(4 + rawToken.length);
        new DataView(packet.buffer).setUint32(0, rawToken.length, false); 
        packet.set(rawToken, 4);
        socket.send(packet);
    };

    socket.onmessage = (event) => {
        const view = new DataView(event.data);
        // [4B Length][4B SenderUID][Payload]
        const senderUid = view.getUint32(4, false); 
        const text = new TextDecoder().decode(event.data.slice(8)); 
        addEntry(text, senderUid);
    };

    function send() {
        const input = document.getElementById('msg');
        const text = input.value;
        if (!text) return;

        const payload = new TextEncoder().encode(text);
        const packet = new Uint8Array(13 + payload.length);
        const view = new DataView(packet.buffer);
        
        view.setUint32(0, 9 + payload.length, false); 
        packet[4] = 0x00; 
        view.setUint32(5, roomId, false); 
        view.setUint32(9, myUID, false);
        packet.set(payload, 13);

        socket.send(packet);
        
        // --- DISPLAY LOCALLY ---
        addEntry(text, myUID);
        input.value = '';
    }

    function addEntry(text, sender) {
        const div = document.createElement('div');
        const isSelf = sender === myUID;
        const isSystem = sender === 0; // UID 0 is the system!

        div.className = `entry ${isSelf ? 'self' : ''} ${isSystem ? 'sys' : ''}`;
        
        if (isSystem) {
            div.innerHTML = `<span class="sys-msg">>> ${text}</span>`;
            div.style.color = "#64748b"; // Dim gray for system logs
            div.style.fontStyle = "italic";
        } else {
            div.innerHTML = `<span class="uid">[${sender}]</span><span class="txt">${text}</span>`;
        }
        
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    document.getElementById('msg').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
