<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conclave | Control Plane</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 40px; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #00ffcc; border-bottom: 2px solid #333; }
        .card { background: #161616; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #222; }
        input { background: #222; border: 1px solid #444; color: #00ffcc; padding: 10px; border-radius: 4px; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .room-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; }
        .room-id { color: #666; font-family: monospace; font-size: 0.8em; }
    </style>
</head>
<body>
<div class="container">
    <h1>CONCLAVE_CONTROL_PLANE</h1>
    
    <div class="card">
        <h3>Initialize Network Segment</h3>
        <input type="text" id="roomName" placeholder="Segment Name">
        <input type="password" id="roomPw" placeholder="Access Key">
        <button onclick="createRoom()">CREATE</button>
    </div>

    <div class="card">
        <h3>Active Segments</h3>
        <div id="roomList">Scanning...</div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    const tabId = crypto.randomUUID();

    async function refreshRooms() {
        const res = await fetch(`${API_BASE}/rooms`);
        const data = await res.json();
        const list = document.getElementById('roomList');
        list.innerHTML = "";
        
        Object.entries(data.rooms).forEach(([id, name]) => {
            list.innerHTML += `
                <div class="room-item">
                    <span><strong>${name}</strong> <span class="room-id">0x${parseInt(id).toString(16)}</span></span>
                    <button onclick="joinSequence('${id}')">JOIN</button>
                </div>`;
        });
    }

    async function createRoom() {
        const name = document.getElementById('roomName').value;
        const pw = document.getElementById('roomPw').value;
        await fetch(`${API_BASE}/create-room?room_name=${name}&room_pw=${pw}`, { method: 'POST' });
        setTimeout(refreshRooms, 500);
    }

    async function joinSequence(roomId) {
        const token = sessionStorage.getItem('conclave_token');
        if (token == null) {
            console.error("Error: No token generated... Refreshing page...");
            window.location.reload();
        }
        
        const pw = prompt("Enter Segment Access Key:");

        // 2. Extract the UID from the token.
        // The first 4 bytes of the decoded base64 are the Big-Endian UID.
        // >>> 0 forces unsigned 32-bit so high-bit UIDs don't go negative.
        const binaryData = atob(token);
        const uid = ((binaryData.charCodeAt(0) << 24) |
                     (binaryData.charCodeAt(1) << 16) |
                     (binaryData.charCodeAt(2) << 8)  |
                      binaryData.charCodeAt(3)) >>> 0;

        // 3. Register intent to join via the bridge
        const joinRes = await fetch(`${API_BASE}/join?roomId=${roomId}&user_id=${uid}&password=${pw}`, { 
            method: 'PUT' 
        });
        
        if (joinRes.ok) {
        // Create a hidden form to navigate via POST
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = `/room=${roomId}`; // Clean URL

        const hiddenField = document.createElement('input');
        hiddenField.type = 'hidden';
        hiddenField.name = 'uid'; // This matches the 'Form' field in Python
        hiddenField.value = uid;

        form.appendChild(hiddenField);
        document.body.appendChild(form);
        form.submit(); // Browser navigates now
    } else {
        const err = await joinRes.json();
        alert(err.detail || "Join failed");
    }
    }

    async function registerUser() {
        try {
            const tokenRes = await fetch(`${API_BASE}/get-token?tab_id=${tabId}`);
            const tokenB64 = await tokenRes.json();
            console.log("Captured Token", tokenB64);

            sessionStorage.setItem('conclave_token', tokenB64);
            return tokenB64
        } catch(err) {
            console.error("Token Error:", err);
        }
    }

    if (sessionStorage.getItem('conclave_token') == null) {
        registerUser();
    }
    refreshRooms();
    setInterval(refreshRooms, 5000);
</script>
</body>
</html>
